services:
  db:
    image: postgres:16
    command: postgres -c max_connections=200
    environment:
      POSTGRES_DB: berhan_pipeline
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/02-hatchet-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d berhan_pipeline"]
      interval: 5s
      timeout: 5s
      retries: 10

  hatchet-lite:
    image: ghcr.io/hatchet-dev/hatchet/hatchet-lite:latest
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8888:8888"
      - "7077:7077"
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/hatchet?sslmode=disable
      SERVER_AUTH_COOKIE_DOMAIN: localhost
      SERVER_AUTH_COOKIE_INSECURE: "t"
      SERVER_GRPC_BIND_ADDRESS: "0.0.0.0"
      SERVER_GRPC_INSECURE: "t"
      SERVER_GRPC_BROADCAST_ADDRESS: localhost:7077
      SERVER_GRPC_PORT: "7077"
      SERVER_URL: http://localhost:8888
      SERVER_AUTH_SET_EMAIL_VERIFIED: "t"
      SERVER_DEFAULT_ENGINE_VERSION: V1
      SERVER_INTERNAL_CLIENT_INTERNAL_GRPC_BROADCAST_ADDRESS: localhost:7077
      ADMIN_EMAIL: admin@berhan.local
      ADMIN_PASSWORD: BerhanAdmin123!
    volumes:
      - hatchet_lite_config:/config

volumes:
  pg_data:
  hatchet_lite_config:
